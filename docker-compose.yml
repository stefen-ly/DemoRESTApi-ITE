services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "${DB_PORT}:${DEFAULT_DB_PORT}"

    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: